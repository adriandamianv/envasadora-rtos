{% extends "base.html" %}
{% block titulo %}Ingreso · Envasadora ENV01{% endblock %}
{% block contenido %}
<section class="tarjeta login">
  <h1>Ingreso al sistema</h1>
  <p class="silencioso">Sistema de supervisión de la envasadora de productos secos.</p>
  <form method="post" action="{{ url_for('auth.login') }}">
    <label>Usuario
      <input type="text" name="usuario" required autofocus autocomplete="username">
    </label>
    <label>Clave
      <input type="password" name="clave" required autocomplete="current-password">
    </label>
    <button type="submit" class="boton">Entrar</button>
  </form>
  <p class="silencioso">Demo: gerente / supervisor / operador — clave <code>1234</code></p>
</section>
{% endblock %}
