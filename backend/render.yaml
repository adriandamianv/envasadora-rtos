# Blueprint de Render: servicio web Python + PostgreSQL gestionado.
# Nota: --workers 1 es obligatorio (Flask-MQTT mantiene una sola conexión).
services:
  - type: web
    name: envasadora-backend
    runtime: python
    plan: free
    rootDir: backend            # el backend vive en la subcarpeta backend/
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 8 --timeout 120 wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: envasadora-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: MQTT_BROKER_URL
        value: broker.hivemq.com
      - key: MQTT_BROKER_PORT
        value: "1883"
      - key: TOPIC_BASE
        value: envasadora/ENV01

databases:
  - name: envasadora-db
    plan: free
